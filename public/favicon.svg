<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#A4161A"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A"/>
      <stop offset="100%" style="stop-color:#FFC300"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Body (Yellow/Orange) -->
  <ellipse cx="16" cy="19" rx="7.5" ry="9" fill="url(#bodyGrad)"/>

  <!-- Left Wing (Blue) -->
  <path d="M 10 17 Q 4 15 2 19 Q 3 21 10 19.5" fill="url(#wingGrad)" opacity="0.95"/>

  <!-- Right Wing (Blue) -->
  <path d="M 22 17 Q 28 15 30 19 Q 29 21 22 19.5" fill="url(#wingGrad)" opacity="0.95"/>

  <!-- Tail feathers -->
  <path d="M 15 27 Q 13 31 14.5 32 Q 16 32.5 16 27" fill="#FF8C00" opacity="0.9"/>
  <path d="M 17 27 Q 18 31 16.5 32 Q 16 32.5 17 27" fill="#FF6B35" opacity="0.9"/>

  <!-- Head (Red) -->
  <circle cx="16" cy="7.5" r="5.5" fill="url(#headGrad)"/>

  <!-- Head highlight -->
  <ellipse cx="16" cy="6" rx="3" ry="2.5" fill="#FF6B6B" opacity="0.6"/>

  <!-- Eye white -->
  <circle cx="18" cy="6.5" r="1.5" fill="white"/>

  <!-- Eye iris -->
  <circle cx="18" cy="6.5" r="0.8" fill="#000"/>

  <!-- Eye shine -->
  <circle cx="18.3" cy="6" r="0.3" fill="white"/>

  <!-- Beak (Black) -->
  <path d="M 20 7.5 L 25 7 L 20.5 8.5 Z" fill="#1a1a1a"/>

  <!-- Beak tip detail -->
  <path d="M 25 7 L 26 6.8 L 25 7.2 Z" fill="#0d0d0d"/>

  <!-- Chest patch (lighter yellow) -->
  <ellipse cx="16" cy="16" rx="4.5" ry="5.5" fill="#FFE55C" opacity="0.7"/>
</svg>
